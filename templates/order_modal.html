<!-- order_modal.html -->
<div class="modal fade" id="orderModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Заявка #<span id="orderModalId"></span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="editOrderForm">
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <h6>Основная информация</h6>
                            <div class="mb-3">
                                <label class="form-label">Тип заявки</label>
                                <select class="form-select" name="type" id="orderModalType" required>
                                    <option value="deposit">Депозит</option>
                                    <option value="withdrawal">Вывод</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Сумма (₽)</label>
                                <input type="number" class="form-control" name="amount" id="orderModalAmount" step="0.01" min="0.01" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <h6>Дополнительно</h6>
                            <div class="mb-3">
                                <label class="form-label">Метод оплаты</label>
                                <select class="form-select" name="method" id="orderModalMethod" required>
                                    <option value="bank_account">Банковский счет</option>
                                    <option value="card">Банковская карта</option>
                                    <option value="crypto">Криптовалюта</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Реквизиты</label>
                                <select class="form-select" name="details_id" id="orderModalDetails" required>
                                    <!-- Заполняется динамически -->
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <h6>Статус</h6>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="status" id="orderStatusPending" value="pending">
                            <label class="form-check-label" for="orderStatusPending">В ожидании</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="status" id="orderStatusCompleted" value="completed">
                            <label class="form-check-label" for="orderStatusCompleted">Завершено</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="status" id="orderStatusCancelled" value="cancelled">
                            <label class="form-check-label" for="orderStatusCancelled">Отменено</label>
                        </div>
                    </div>
                </form>

                <div class="d-flex justify-content-between mt-4">
                    <button class="btn btn-danger" id="deleteOrderBtn">
                        <i class="fas fa-trash me-1"></i> Удалить заявку
                    </button>
                    <button class="btn btn-primary" id="saveOrderBtn">
                        <i class="fas fa-save me-1"></i> Сохранить изменения
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
