<div class="modal fade" id="depositRequestModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Пополнение баланса</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="depositRequestForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="type" value="deposit">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Сумма пополнения (₽)</label>
                        <input type="number" class="form-control" name="amount" step="0.01" min="100" required>
                        <small class="text-muted">Минимальная сумма: 100 ₽</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Метод пополнения</label>
                        <select class="form-select" name="method" required>
                            <option value="bank">Банковский перевод</option>
                            <option value="card">Банковская карта</option>
                            <option value="qiwi">QIWI Кошелек</option>
                            <option value="yoomoney">ЮMoney</option>
                            <option value="crypto">Криптовалюта</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Комментарий (необязательно)</label>
                        <textarea class="form-control" name="comment" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" class="btn btn-success">Создать заявку</button>
                </div>
            </form>
        </div>
    </div>
</div>
