<div class="modal fade" id="withdrawalRequestModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Вывод средств</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="withdrawalRequestForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="type" value="withdrawal">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Сумма вывода (₽)</label>
                        <input type="number" class="form-control" name="amount" step="0.01" min="100" required>
                        <small class="text-muted">Доступно: {{ "%.2f"|format(user.balance) }} ₽</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Метод вывода</label>
                        <select class="form-select" name="method" required>
                            <option value="bank">Банковский счет</option>
                            <option value="card">Банковская карта</option>
                            <option value="qiwi">QIWI Кошелек</option>
                            <option value="yoomoney">ЮMoney</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Реквизиты</label>
                        <input type="text" class="form-control" name="requisites" required>
                        <small class="text-muted">Номер счета/карты/кошелька</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Комментарий (необязательно)</label>
                        <textarea class="form-control" name="comment" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" class="btn btn-primary">Создать заявку</button>
                </div>
            </form>
        </div>
    </div>
</div>
