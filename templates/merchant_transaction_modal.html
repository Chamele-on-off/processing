<div class="modal fade" id="newTransactionModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Новая транзакция</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="transactionForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Тип транзакции</label>
                        <select class="form-select" name="type" required>
                            <option value="payment">Платеж</option>
                            <option value="payout">Выплата</option>
                            <option value="refund">Возврат</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Сумма (₽)</label>
                        <input type="number" class="form-control" name="amount" step="0.01" min="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Метод оплаты</label>
                        <select class="form-select" name="method" required>
                            <option value="bank">Банковский перевод</option>
                            <option value="card">Карта</option>
                            <option value="qiwi">QIWI</option>
                            <option value="yoomoney">ЮMoney</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Описание</label>
                        <textarea class="form-control" name="description" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="submit" class="btn btn-primary">Создать</button>
                </div>
            </form>
        </div>
    </div>
</div>
